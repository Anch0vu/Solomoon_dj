version: '3.9'

services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: solomoon-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml:ro
      - icecast-logs:/var/log/icecast2
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      ICECAST_ADMIN_PASSWORD:  ${ICECAST_ADMIN_PASSWORD}
      ICECAST_RELAY_PASSWORD:  ${ICECAST_RELAY_PASSWORD}
      ICECAST_PASSWORD:        ${ICECAST_LISTENER_PASSWORD:-}
      ICECAST_HOSTNAME:        ${SERVER_HOST:-localhost}
    networks:
      - solomoon
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: solomoon-liquidsoap
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    volumes:
      - ./liquidsoap/radio.liq:/radio.liq:ro
      - ./music:/music:ro
      - liquidsoap-logs:/var/log/liquidsoap
    environment:
      ICECAST_HOST:            icecast
      ICECAST_PORT:            "8000"
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      HARBOR_PASSWORD:         ${HARBOR_PASSWORD}
    command: ["liquidsoap", "/radio.liq"]
    networks:
      - solomoon
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  radio-api:
    build:
      context: ./radio-api
      dockerfile: Dockerfile
    container_name: solomoon-radio-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT:             "8080"
      DJ_TOKEN:         ${DJ_TOKEN}
      HARBOR_PASSWORD:  ${HARBOR_PASSWORD}
      LIQUIDSOAP_HOST:  liquidsoap
      HARBOR_PORT:      "8005"
      NODE_ENV:         production
    networks:
      - solomoon
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

volumes:
  icecast-logs:
  liquidsoap-logs:

networks:
  solomoon:
    driver: bridge
